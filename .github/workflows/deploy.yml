name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  UV_SYSTEM_PYTHON: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'  # Use latest stable Python

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Optional: cache uv packages for faster builds
      - name: Cache uv packages
        uses: actions/cache@v3
        with:
          path: ~/.uvx
          key: ${{ runner.os }}-uvx-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uvx-

      - name: Export notebooks and apps
        run: |
          uv run .github/scripts/build.py --output-dir _site --template templates/tailwind.html.j2
          tree _site || true

      - name: Verify output
        run: |
          if [ ! -d "_site" ] || [ -z "$(ls -A _site)" ]; then
            echo "_site folder is empty! Aborting."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

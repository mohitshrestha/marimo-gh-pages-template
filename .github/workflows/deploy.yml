# Workflow to build and deploy marimo notebooks and apps to GitHub Pages
# Features:
# - Uses Python + uv package manager to export notebooks and apps
# - Automatically skips drafts and generates grouped index pages
# - Supports nested folders (categories) for intuitive organization
# - Deploys the generated _site directory to GitHub Pages
# - Compatible with Python scripts, Jupyter notebooks, Quarto, etc.

name: Deploy to GitHub Pages

# Trigger conditions
on:
  push:
    branches: ['main']        # Trigger the workflow on push to main branch
  workflow_dispatch:          # Allow manual triggering from GitHub UI

# Concurrency ensures only one workflow run at a time
concurrency:
  group: 'pages'
  cancel-in-progress: false   # Do not cancel ongoing workflow runs

# Environment variables for the workflow
env:
  UV_SYSTEM_PYTHON: 1                    # Use system Python for uv package manager
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt-in Node.js 24 for deprecated JS actions to future-proof workflow

jobs:
  # ------------------------------
  # BUILD JOB
  # ------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v5
        # Ensures the workflow has access to your code

      # Step 2: Optional Python setup
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'  # Adjust to your preferred Python version
        # Ensures reproducible Python environment

      # Step 3: Install uv package manager
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        # UV simplifies Python dependency management and execution

      # Step 4: Build/export notebooks and apps
      - name: Export notebooks and apps
        run: |
          # Use build.py script to export files
          # Explicitly specify output directory and template
          uv run .github/scripts/build.py --output-dir _site --template templates/tailwind.html.j2
          
          # Display folder structure for debugging purposes
          echo "Build complete, showing _site structure:"
          tree _site || true

      # Step 5: Verify _site folder is not empty
      - name: Verify site output
        run: |
          # Prevent deploying an empty site
          if [ ! -d "_site" ] || [ -z "$(ls -A _site)" ]; then
            echo "_site directory is empty! Aborting deployment."
            exit 1
          fi

      # Step 6: Upload _site as artifact for deployment
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
        # This artifact is used by the deploy job

  # ------------------------------
  # DEPLOY JOB
  # ------------------------------
  deploy:
    needs: build  # Deploy runs only after build succeeds
    runs-on: ubuntu-latest

    # Required permissions for GitHub Pages deployment
    permissions:
      pages: write   # Grant write access to GitHub Pages
      id-token: write # Required for authentication

    # Deployment environment configuration
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step 1: Deploy the site to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # Publishes the _site folder to GitHub Pages
